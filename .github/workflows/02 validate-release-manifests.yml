name: Validate Release Manifests

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - 'compose.yml'
      - 'docker-compose.beta.yml'
      - 'docker-compose.prod.yml'
      - 'releases/*.env'
      - '.github/workflows/02 validate-release-manifests.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate release manifest filenames and values
        shell: bash
        run: |
          shopt -s nullglob
          manifests=(releases/*.env)
          if [ "${#manifests[@]}" -eq 0 ]; then
            echo "No release manifests found under releases/" >&2
            exit 1
          fi

          for manifest in "${manifests[@]}"; do
            release_name="$(basename "${manifest}" .env)"
            if [[ ! "${release_name}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Invalid manifest name: ${manifest}" >&2
              exit 1
            fi

            value="$(grep -E '^TIGERS_VERSION=' "${manifest}" | tail -n 1 | cut -d= -f2- || true)"
            if [[ -n "${value}" ]]; then
              [[ "${value}" == "v${release_name}" ]] || { echo "${manifest}: TIGERS_VERSION must be v${release_name}" >&2; exit 1; }
            else
              for key in TT_INFRA_IMAGE_TAG TT_AUTH_IMAGE_TAG TT_MEMBERS_IMAGE_TAG TT_AGENDA_IMAGE_TAG TT_ANALYTICS_IMAGE_TAG TT_ATTENDANCE_IMAGE_TAG; do
                legacy="$(grep -E "^${key}=" "${manifest}" | tail -n 1 | cut -d= -f2- || true)"
                [[ "${legacy}" == "v${release_name}" ]] || { echo "${manifest}: ${key} must be v${release_name}" >&2; exit 1; }
              done
            fi
          done

      - name: Render Arcane beta compose for each release manifest
        shell: bash
        run: |
          cat > /tmp/tt-infra-ci.env <<'EOF'
          INFRA_SECRET_KEY=ci-placeholder-infra-secret
          AUTH_SECRET_KEY=ci-placeholder-auth-secret
          MEMBERS_SECRET_KEY=ci-placeholder-members-secret
          AGENDA_SECRET_KEY=ci-placeholder-agenda-secret
          ANALYTICS_SECRET_KEY=ci-placeholder-analytics-secret
          ATTENDANCE_SECRET_KEY=ci-placeholder-attendance-secret
          INTERNAL_API_SECRET=ci-placeholder-internal-api-secret
          SSO_SHARED_SECRET=ci-placeholder-sso-shared-secret
          DEFAULT_ADMIN_PASSWORD=ci-placeholder-admin-password
          POSTGRES_INFRA_PASSWORD=ci-placeholder-postgres-infra-password
          POSTGRES_AUTH_PASSWORD=ci-placeholder-postgres-auth-password
          POSTGRES_MEMBERS_PASSWORD=ci-placeholder-postgres-members-password
          POSTGRES_AGENDA_PASSWORD=ci-placeholder-postgres-agenda-password
          POSTGRES_ANALYTICS_PASSWORD=ci-placeholder-postgres-analytics-password
          POSTGRES_ATTENDANCE_PASSWORD=ci-placeholder-postgres-attendance-password
          EOF

          for manifest in releases/*.env; do
            echo "Validating ${manifest}"
            docker compose \
              --env-file "${manifest}" \
              --env-file /tmp/tt-infra-ci.env \
              -f compose.yml \
              -f docker-compose.beta.yml \
              config > /dev/null
          done
