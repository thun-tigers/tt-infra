services:
  tt-infra:
    build: .
    image: ghcr.io/swisi/tt-infra:latest
    env_file:
      - path: ./instance/generated.env
        required: false
    environment:
      SECRET_KEY: ${INFRA_SECRET_KEY:-tt-infra-dev-secret}
      SQLALCHEMY_DATABASE_URI: ${INFRA_DATABASE_URL:-postgresql+psycopg://tt_infra:tt_infra_password@tt-postgres:5432/tt_infra}
      AUTH_BASE_URL: ${AUTH_BASE_URL:-http://localhost:8080/auth}
      SSO_SHARED_SECRET: ${SSO_SHARED_SECRET:-tt-sso-dev-secret-change-me}
      MEMBERS_DATABASE_URL: ${MEMBERS_DATABASE_URL:-postgresql+psycopg://tt_members:tt_members_password@tt-postgres:5432/tt_members}
      AUTH_DATABASE_URL: ${AUTH_DATABASE_URL:-postgresql+psycopg://tt_auth:tt_auth_password@tt-postgres:5432/tt_auth}
      AGENDA_DATABASE_URL: ${AGENDA_DATABASE_URL:-postgresql+psycopg://tt_agenda:tt_agenda_password@tt-postgres:5432/tt_agenda}
      ATTENDANCE_DATABASE_URL: ${ATTENDANCE_DATABASE_URL:-postgresql+psycopg://tt_attendance:tt_attendance_password@tt-postgres:5432/tt_attendance}
      ANALYTICS_DATABASE_URL: ${ANALYTICS_DATABASE_URL:-postgresql+psycopg://tt_analytics:tt_analytics_password@tt-postgres:5432/tt_analytics}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-tt-internal-dev-secret-change-me}
      AUTO_CREATE_DB: "true"
      LOG_LEVEL: INFO
      TZ: ${TZ:-Europe/Zurich}
      MEMBERS_INSTANCE_DIR: /backup-sources/tt-members-instance
      ANALYTICS_UPLOAD_ROOT: /backup-sources/tt-analytics-uploads
    volumes:
      - ./instance:/app/instance
      - tt-members-data:/backup-sources/tt-members-instance
      - analytics-uploads-data:/backup-sources/tt-analytics-uploads
    depends_on:
      tt-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/api/health').status == 200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - tigers-internal

  tt-auth:
    build:
      context: ../tt-auth
    image: ghcr.io/swisi/tt-auth:latest
    env_file:
      - path: ./instance/generated.env
        required: false
    environment:
      SECRET_KEY: ${AUTH_SECRET_KEY}
      SQLALCHEMY_DATABASE_URI: ${AUTH_DATABASE_URL}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-8}
      JWT_COOKIE_DOMAIN: ${JWT_COOKIE_DOMAIN:-}
      JWT_COOKIE_SECURE: ${JWT_COOKIE_SECURE:-false}
      LOG_LEVEL: INFO
      AUTO_CREATE_DB: "true"
      CREATE_DEFAULT_USERS: "true"
      CREATE_DEFAULT_SERVICES: "true"
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-admin}
      DEFAULT_MEMBERS_URL: ${DEFAULT_MEMBERS_URL:-http://localhost:8080/members}
      DEFAULT_AGENDA_URL: ${DEFAULT_AGENDA_URL:-http://localhost:8080/agenda}
      DEFAULT_ANALYTICS_URL: ${DEFAULT_ANALYTICS_URL:-http://localhost:8080/analytics}
      DEFAULT_INFRA_URL: ${DEFAULT_INFRA_URL:-http://localhost:8080/infra}
      DEFAULT_MEMBERS_INTERNAL_URL: ${DEFAULT_MEMBERS_INTERNAL_URL:-http://tt-members:5000}
      DEFAULT_AGENDA_INTERNAL_URL: ${DEFAULT_AGENDA_INTERNAL_URL:-http://tt-agenda:5000}
      DEFAULT_ANALYTICS_INTERNAL_URL: ${DEFAULT_ANALYTICS_INTERNAL_URL:-http://tt-analytics:5000}
      DEFAULT_ATTENDANCE_URL: ${DEFAULT_ATTENDANCE_URL:-http://localhost:8080/attendance}
      DEFAULT_ATTENDANCE_INTERNAL_URL: ${DEFAULT_ATTENDANCE_INTERNAL_URL:-http://tt-attendance:5000}
      TT_INFRA_INTERNAL_URL: ${TT_INFRA_INTERNAL_URL:-http://tt-infra:5000}
      SSO_SHARED_SECRET: ${SSO_SHARED_SECRET}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-tt-internal-dev-secret-change-me}
      SSO_TOKEN_EXPIRY_SECONDS: ${SSO_TOKEN_EXPIRY_SECONDS:-60}
      RATELIMIT_STORAGE_URI: redis://tt-redis:6379/0
      TZ: ${TZ:-Europe/Zurich}
    depends_on:
      tt-redis:
        condition: service_healthy
      tt-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health').status == 200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - tigers-internal

  tt-members:
    build:
      context: ../tt-members
    image: ghcr.io/swisi/tt-members:latest
    env_file:
      - path: ./instance/generated.env
        required: false
    environment:
      SECRET_KEY: ${MEMBERS_SECRET_KEY:-tt-members-dev-secret}
      SQLALCHEMY_DATABASE_URI: ${MEMBERS_DATABASE_URL:-postgresql+psycopg://tt_members:tt_members_password@tt-postgres:5432/tt_members}
      LOG_LEVEL: INFO
      AUTH_BASE_URL: ${AUTH_BASE_URL:-http://localhost:8080/auth}
      TT_AUTH_INTERNAL_URL: ${TT_AUTH_INTERNAL_URL:-http://tt-auth:5000}
      TT_INFRA_INTERNAL_URL: ${TT_INFRA_INTERNAL_URL:-http://tt-infra:5000}
      SSO_SHARED_SECRET: ${SSO_SHARED_SECRET:-tt-sso-dev-secret-change-me}
      SSO_EXPECTED_AUDIENCE: ${MEMBERS_SSO_EXPECTED_AUDIENCE:-tt-members}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-tt-internal-dev-secret-change-me}
      RATELIMIT_STORAGE_URI: memory://
      SSO_REPLAY_STORAGE_URI: redis://tt-redis:6379/3
      TZ: ${TZ:-Europe/Zurich}
    volumes:
      - tt-members-data:/app/instance
    depends_on:
      tt-auth:
        condition: service_healthy
      tt-infra:
        condition: service_healthy
      tt-postgres:
        condition: service_healthy
      tt-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health').status == 200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - tigers-internal

  tt-agenda:
    build:
      context: ../tt-agenda
    image: ghcr.io/swisi/tt-agenda:latest
    env_file:
      - path: ./instance/generated.env
        required: false
    environment:
      SECRET_KEY: ${AGENDA_SECRET_KEY}
      SQLALCHEMY_DATABASE_URI: ${AGENDA_DATABASE_URL}
      AUTH_BASE_URL: ${AUTH_BASE_URL:-http://localhost:8080/auth}
      TT_MEMBERS_INTERNAL_URL: ${TT_MEMBERS_INTERNAL_URL:-http://tt-members:5000}
      TT_INFRA_INTERNAL_URL: ${TT_INFRA_INTERNAL_URL:-http://tt-infra:5000}
      SSO_SHARED_SECRET: ${SSO_SHARED_SECRET}
      SSO_EXPECTED_AUDIENCE: ${AGENDA_SSO_EXPECTED_AUDIENCE:-tt-agenda}
      SSO_AUTO_PROVISION_USERS: ${AGENDA_SSO_AUTO_PROVISION_USERS:-true}
      SSO_SYNC_ROLE: ${AGENDA_SSO_SYNC_ROLE:-true}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-tt-internal-dev-secret-change-me}
      WEBHOOK_ENABLED: ${AGENDA_WEBHOOK_ENABLED:-false}
      WEBHOOK_URL: ${AGENDA_WEBHOOK_URL}
      RATELIMIT_STORAGE_URI: redis://tt-redis:6379/1
      SSO_REPLAY_STORAGE_URI: redis://tt-redis:6379/3
      LOG_LEVEL: INFO
      TZ: ${TZ:-Europe/Zurich}
    depends_on:
      tt-redis:
        condition: service_healthy
      tt-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - tigers-internal

  tt-analytics:
    build:
      context: ../tt-analytics
    image: ghcr.io/swisi/tt-analytics:latest
    env_file:
      - path: ./instance/generated.env
        required: false
    environment:
      SECRET_KEY: ${ANALYTICS_SECRET_KEY}
      SQLALCHEMY_DATABASE_URI: ${ANALYTICS_DATABASE_URL}
      AUTH_BASE_URL: ${AUTH_BASE_URL:-http://localhost:8080/auth}
      TT_MEMBERS_INTERNAL_URL: ${TT_MEMBERS_INTERNAL_URL:-http://tt-members:5000}
      TT_INFRA_INTERNAL_URL: ${TT_INFRA_INTERNAL_URL:-http://tt-infra:5000}
      SSO_SHARED_SECRET: ${SSO_SHARED_SECRET}
      SSO_EXPECTED_AUDIENCE: ${ANALYTICS_SSO_EXPECTED_AUDIENCE:-tt-analytics}
      SSO_AUTO_PROVISION_USERS: ${ANALYTICS_SSO_AUTO_PROVISION_USERS:-true}
      SSO_SYNC_ROLE: ${ANALYTICS_SSO_SYNC_ROLE:-true}
      AUTO_CREATE_DB: "true"
      LOG_LEVEL: INFO
      UPLOAD_ROOT: ${ANALYTICS_UPLOAD_ROOT:-/app/instance/uploads}
      MAX_CONTENT_LENGTH: ${ANALYTICS_MAX_CONTENT_LENGTH:-2147483648}
      GEMINI_API_KEY: ${ANALYTICS_GEMINI_API_KEY:-}
      GEMINI_MODEL: ${ANALYTICS_GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_FILE_POLL_SECONDS: ${ANALYTICS_GEMINI_FILE_POLL_SECONDS:-5}
      GEMINI_FILE_POLL_TIMEOUT_SECONDS: ${ANALYTICS_GEMINI_FILE_POLL_TIMEOUT_SECONDS:-300}
      GEMINI_MAX_RETRIES: ${ANALYTICS_GEMINI_MAX_RETRIES:-8}
      GEMINI_RETRY_BUFFER_SECONDS: ${ANALYTICS_GEMINI_RETRY_BUFFER_SECONDS:-5}
      GEMINI_RETRY_DEFAULT_SECONDS: ${ANALYTICS_GEMINI_RETRY_DEFAULT_SECONDS:-60}
      RATELIMIT_STORAGE_URI: redis://tt-redis:6379/2
      SSO_REPLAY_STORAGE_URI: redis://tt-redis:6379/3
      TZ: ${TZ:-Europe/Zurich}
    volumes:
      - analytics-uploads-data:/app/instance/uploads
    depends_on:
      tt-redis:
        condition: service_healthy
      tt-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - tigers-internal

  tt-attendance:
    build:
      context: ../tt-attendance
    image: ghcr.io/swisi/tt-attendance:latest
    env_file:
      - path: ./instance/generated.env
        required: false
    environment:
      SECRET_KEY: ${ATTENDANCE_SECRET_KEY:-tt-attendance-dev-secret}
      SQLALCHEMY_DATABASE_URI: ${ATTENDANCE_DATABASE_URL:-postgresql+psycopg://tt_attendance:tt_attendance_password@tt-postgres:5432/tt_attendance}
      AUTH_BASE_URL: ${AUTH_BASE_URL:-http://localhost:8080/auth}
      TT_AUTH_INTERNAL_URL: ${TT_AUTH_INTERNAL_URL:-http://tt-auth:5000}
      TT_MEMBERS_INTERNAL_URL: ${TT_MEMBERS_INTERNAL_URL:-http://tt-members:5000}
      TT_AGENDA_INTERNAL_URL: ${TT_AGENDA_INTERNAL_URL:-http://tt-agenda:5000}
      TT_INFRA_INTERNAL_URL: ${TT_INFRA_INTERNAL_URL:-http://tt-infra:5000}
      SSO_SHARED_SECRET: ${SSO_SHARED_SECRET:-tt-sso-dev-secret-change-me}
      SSO_EXPECTED_AUDIENCE: ${ATTENDANCE_SSO_EXPECTED_AUDIENCE:-tt-attendance}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-tt-internal-dev-secret-change-me}
      RATELIMIT_STORAGE_URI: memory://
      SSO_REPLAY_STORAGE_URI: redis://tt-redis:6379/3
      LOG_LEVEL: INFO
      TZ: ${TZ:-Europe/Zurich}
    depends_on:
      tt-auth:
        condition: service_healthy
      tt-agenda:
        condition: service_healthy
      tt-postgres:
        condition: service_healthy
      tt-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - tigers-internal

  tt-redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - tigers-internal

  tt-postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    image: ghcr.io/swisi/tt-postgres:latest
    environment:
      POSTGRES_DB: ${POSTGRES_INFRA_DB:-tt_infra}
      POSTGRES_USER: ${POSTGRES_INFRA_USER:-tt_infra}
      POSTGRES_PASSWORD: ${POSTGRES_INFRA_PASSWORD:-tt_infra_password}
      # Weitergabe an Init-Script für die anderen Datenbanken
      POSTGRES_AUTH_USER: ${POSTGRES_AUTH_USER:-tt_auth}
      POSTGRES_AUTH_PASSWORD: ${POSTGRES_AUTH_PASSWORD:-tt_auth_password}
      POSTGRES_AUTH_DB: ${POSTGRES_AUTH_DB:-tt_auth}
      POSTGRES_MEMBERS_USER: ${POSTGRES_MEMBERS_USER:-tt_members}
      POSTGRES_MEMBERS_PASSWORD: ${POSTGRES_MEMBERS_PASSWORD:-tt_members_password}
      POSTGRES_MEMBERS_DB: ${POSTGRES_MEMBERS_DB:-tt_members}
      POSTGRES_AGENDA_USER: ${POSTGRES_AGENDA_USER:-tt_agenda}
      POSTGRES_AGENDA_PASSWORD: ${POSTGRES_AGENDA_PASSWORD:-tt_agenda_password}
      POSTGRES_AGENDA_DB: ${POSTGRES_AGENDA_DB:-tt_agenda}
      POSTGRES_ATTENDANCE_USER: ${POSTGRES_ATTENDANCE_USER:-tt_attendance}
      POSTGRES_ATTENDANCE_PASSWORD: ${POSTGRES_ATTENDANCE_PASSWORD:-tt_attendance_password}
      POSTGRES_ATTENDANCE_DB: ${POSTGRES_ATTENDANCE_DB:-tt_attendance}
      POSTGRES_ANALYTICS_USER: ${POSTGRES_ANALYTICS_USER:-tt_analytics}
      POSTGRES_ANALYTICS_PASSWORD: ${POSTGRES_ANALYTICS_PASSWORD:-tt_analytics_password}
      POSTGRES_ANALYTICS_DB: ${POSTGRES_ANALYTICS_DB:-tt_analytics}
      TZ: ${TZ:-Europe/Zurich}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_INFRA_USER:-tt_infra} -d ${POSTGRES_INFRA_DB:-tt_infra}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - tigers-internal

  # Einziger Entry Point lokal: http://localhost:8080 (analog Beta)
  tt-proxy:
    image: caddy:2-alpine
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile.local:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped
    networks:
      - tigers-internal

networks:
  tigers-internal:
    driver: bridge

volumes:
  tt-members-data:
    external: true
    name: tt-members_tt-members-data
  postgres-data:
  analytics-uploads-data:
  redis-data:
  caddy-data:
  caddy-config:
