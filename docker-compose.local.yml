services:
  tt-infra:
    build:
      args:
        TT_COMMON_REF: v0.1.17
    ports:
      - "${INFRA_PORT:-8084}:5000"

  tt-auth:
    build:
      args:
        TT_COMMON_REF: v0.1.17
    environment:
      PYTHONPATH: /opt/tt-common
    volumes:
      - ../tt-common:/opt/tt-common:ro
    ports:
      - "${AUTH_PORT:-8085}:5000"

  tt-members:
    build:
      args:
        TT_COMMON_REF: v0.1.17
    environment:
      PYTHONPATH: /opt/tt-common
    volumes:
      - ../tt-common:/opt/tt-common:ro
    ports:
      - "${MEMBERS_PORT:-8088}:5000"

  tt-agenda:
    build:
      args:
        TT_COMMON_REF: v0.1.17
    environment:
      PYTHONPATH: /opt/tt-common
    volumes:
      - ../tt-common:/opt/tt-common:ro
    ports:
      - "${AGENDA_PORT:-8086}:5000"

  tt-analytics:
    build:
      args:
        TT_COMMON_REF: v0.1.17
    environment:
      PYTHONPATH: /opt/tt-common
    volumes:
      - ../tt-common:/opt/tt-common:ro
    ports:
      - "${ANALYTICS_PORT:-8087}:5000"

  tt-attendance:
    build:
      args:
        TT_COMMON_REF: v0.1.17
    environment:
      PYTHONPATH: /opt/tt-common
    volumes:
      - ../tt-common:/opt/tt-common:ro
    ports:
      - "${ATTENDANCE_PORT:-8089}:5000"

  tt-postgres:
    ports:
      - "5432:5432"
