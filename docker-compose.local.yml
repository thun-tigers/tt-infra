services:
  tt-infra:
    build:
      context: .
      # Ohne dies erzeugt jeder Build eine neue Provenance-Attestation (mit
      # Zeitstempel) und damit eine neue Image-ID, selbst wenn alle Layer
      # gecacht sind - "docker compose up -d" recreated tt-infra dann bei
      # JEDEM Deploy, auch ohne echte Aenderung. Relevant, weil die Ops-
      # Buttons (/ops/apply, /ops/restart) genau diesen Container waehrend
      # der Ausfuehrung des eigenen Requests neu starten wuerden.
      provenance: false
    pull_policy: build
    env_file: .env
    environment:
      SECRET_KEY: ${INFRA_SECRET_KEY}
      DATABASE_URL: ${INFRA_DATABASE_URL}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      SSO_SHARED_SECRET: ${SSO_SHARED_SECRET}
      MEMBERS_INSTANCE_DIR: ${MEMBERS_INSTANCE_DIR:-/app/instance/tt-members-instance}
      ANALYTICS_UPLOAD_ROOT: ${ANALYTICS_UPLOAD_ROOT:-/app/instance/tt-analytics-uploads}
      # Die Ops-Buttons (/ops/apply, /ops/restart) rufen deploy.sh auf, das
      # hier per pull_policy:build ALLE Services aus Sibling-Ordnern baut
      # (../tt-auth, ../tt-analytics, ...) - dafuer muss der Container das
      # Eltern-Verzeichnis sehen, nicht nur den eigenen Checkout (siehe
      # zugehoeriges Volume unten). Nur lokal so weit gefasst; beta/production
      # bleiben beim schmalen Default aus compose.yml (kein Sibling-Build).
      TIGERS_STACK_ROOT: /opt/tigers-parent/tt-infra
    command: ["gunicorn", "--bind", "0.0.0.0:5000", "--workers", "4", "--timeout", "120", "--access-logfile", "-", "--error-logfile", "-", "run:app"]
    volumes:
      - ./instance:/app/instance
      - ..:/opt/tigers-parent:rw
    ports:
      - "${INFRA_PORT:-8084}:5000"

  tt-auth:
    build:
      context: ../tt-auth
      args:
        TT_COMMON_TAG: beta
    pull_policy: build
    env_file: .env
    environment:
      PYTHONPATH: /opt/tt-common
      SECRET_KEY: ${AUTH_SECRET_KEY}
      DATABASE_URL: ${AUTH_DATABASE_URL}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      SSO_SHARED_SECRET: ${SSO_SHARED_SECRET}
      TT_MEMBERS_INTERNAL_URL: http://tt-members:5000
    volumes:
      - ../tt-common:/opt/tt-common:ro
    ports:
      - "${AUTH_PORT:-8085}:5000"

  tt-members:
    build:
      context: ../tt-members
      args:
        TT_COMMON_TAG: beta
    pull_policy: build
    env_file: .env
    environment:
      PYTHONPATH: /opt/tt-common
      SECRET_KEY: ${MEMBERS_SECRET_KEY}
      DATABASE_URL: ${MEMBERS_DATABASE_URL}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      SSO_SHARED_SECRET: ${SSO_SHARED_SECRET}
      TT_AUTH_INTERNAL_URL: http://tt-auth:5000
    volumes:
      - ../tt-common:/opt/tt-common:ro
    ports:
      - "${MEMBERS_PORT:-8088}:5000"

  tt-agenda:
    build:
      context: ../tt-agenda
      args:
        TT_COMMON_TAG: beta
    pull_policy: build
    env_file: .env
    environment:
      PYTHONPATH: /opt/tt-common
      SECRET_KEY: ${AGENDA_SECRET_KEY}
      DATABASE_URL: ${AGENDA_DATABASE_URL}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      SSO_SHARED_SECRET: ${SSO_SHARED_SECRET}
      TT_AUTH_INTERNAL_URL: http://tt-auth:5000
      TT_MEMBERS_INTERNAL_URL: http://tt-members:5000
    volumes:
      - ../tt-common:/opt/tt-common:ro
    ports:
      - "${AGENDA_PORT:-8086}:5000"

  tt-analytics:
    build:
      context: ../tt-analytics
      args:
        TT_COMMON_TAG: beta
    pull_policy: build
    env_file: .env
    environment:
      PYTHONPATH: /opt/tt-common
      SECRET_KEY: ${ANALYTICS_SECRET_KEY}
      DATABASE_URL: ${ANALYTICS_DATABASE_URL}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      SSO_SHARED_SECRET: ${SSO_SHARED_SECRET}
    volumes:
      - ../tt-common:/opt/tt-common:ro
    ports:
      - "${ANALYTICS_PORT:-8087}:5000"

  tt-attendance:
    build:
      context: ../tt-attendance
      args:
        TT_COMMON_TAG: beta
    pull_policy: build
    env_file: .env
    environment:
      PYTHONPATH: /opt/tt-common
      SECRET_KEY: ${ATTENDANCE_SECRET_KEY}
      DATABASE_URL: ${ATTENDANCE_DATABASE_URL}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      SSO_SHARED_SECRET: ${SSO_SHARED_SECRET}
      TT_AUTH_INTERNAL_URL: http://tt-auth:5000
      TT_MEMBERS_INTERNAL_URL: http://tt-members:5000
      TT_AGENDA_INTERNAL_URL: http://tt-agenda:5000
      TT_INFRA_INTERNAL_URL: http://tt-infra:5000
    command: ["gunicorn", "--bind", "0.0.0.0:5000", "--workers", "4", "--timeout", "120", "--access-logfile", "-", "--error-logfile", "-", "run:app"]
    volumes:
      - ../tt-common:/opt/tt-common:ro
    ports:
      - "${ATTENDANCE_PORT:-8089}:5000"

  tt-postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    pull_policy: build
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"

volumes:
  tt-members-data:
    external: true
    name: tt-members_tt-members-data
  postgres-data:
    name: tigers-local_postgres-data
  analytics-uploads-data:
    name: tigers-local_analytics-uploads-data
  redis-data:
    name: tigers-local_redis-data
  caddy-data:
    name: tigers-local_caddy-data
  caddy-config:
    name: tigers-local_caddy-config
