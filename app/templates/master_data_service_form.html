{% extends 'base.html' %}
{% block title %}Service {{ action }} – Tigers Infra{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <div class="flex items-center gap-3 mb-5">
        <a href="{{ url_for('master_data.services') }}" class="p-2 text-slate-500 hover:text-slate-700 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h1 class="text-lg font-bold text-slate-900 dark:text-white">Service {{ action }}</h1>
    </div>

    <div class="bg-white dark:bg-slate-800 rounded-xl shadow border border-slate-200 dark:border-slate-700 p-5">
        <form method="POST" class="space-y-4">

            <div>
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Name *</label>
                <input type="text" name="name" value="{{ form_data.get('name', '') }}" required
                    class="block w-full px-3 py-2.5 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">URL (öffentlich) *</label>
                <input type="url" name="url" value="{{ form_data.get('url', '') }}" required placeholder="https://..."
                    class="block w-full px-3 py-2.5 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Interne URL <span class="text-slate-400 font-normal">(Service-zu-Service)</span></label>
                <input type="url" name="internal_url" value="{{ form_data.get('internal_url') or '' }}" placeholder="http://tt-members:5000"
                    class="block w-full px-3 py-2.5 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">
                    Bootstrap Icon <span class="text-slate-400 font-normal">(<a href="https://icons.getbootstrap.com" target="_blank" class="text-indigo-500 hover:underline">icons.getbootstrap.com</a>)</span>
                </label>
                <div class="flex items-center gap-2 px-3 py-2.5 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700">
                    <i id="icon-preview" class="bi bi-{{ form_data.get('icon') or 'grid' }} text-indigo-500"></i>
                    <input type="text" name="icon" id="icon-input" value="{{ form_data.get('icon') or 'grid' }}"
                        class="flex-1 bg-transparent text-slate-900 dark:text-slate-100 focus:outline-none text-sm"
                        placeholder="z.B. calendar-check">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Beschreibung</label>
                <textarea name="description" rows="2"
                    class="block w-full px-3 py-2.5 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm resize-none">{{ form_data.get('description', '') }}</textarea>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Mindestrolle</label>
                    <select name="required_role"
                        class="block w-full px-3 py-2.5 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                        <option value="user" {% if form_data.get('required_role') != 'admin' %}selected{% endif %}>Benutzer</option>
                        <option value="admin" {% if form_data.get('required_role') == 'admin' %}selected{% endif %}>Admin</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Reihenfolge</label>
                    <input type="number" name="sort_order" value="{{ form_data.get('sort_order', 0) }}" min="0"
                        class="block w-full px-3 py-2.5 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                </div>
            </div>

            <div class="flex items-center gap-3">
                <input type="checkbox" id="is_active" name="is_active" value="y"
                    {% if form_data.get('is_active', True) %}checked{% endif %}
                    class="w-4 h-4 text-indigo-600 border-slate-300 rounded focus:ring-indigo-500">
                <label for="is_active" class="text-sm font-medium text-slate-700 dark:text-slate-300">Service aktiv (im Dashboard anzeigen)</label>
            </div>

            <div class="flex gap-3 pt-2">
                <button type="submit"
                    class="flex-1 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg transition text-sm">
                    <i class="bi bi-check-lg mr-2"></i>{{ action }}
                </button>
                <a href="{{ url_for('master_data.services') }}"
                    class="flex-1 py-2.5 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-300 font-semibold rounded-lg transition text-sm text-center">
                    Abbrechen
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const iconInput = document.getElementById('icon-input');
    const iconPreview = document.getElementById('icon-preview');
    iconInput.addEventListener('input', () => {
        iconPreview.className = `bi bi-${iconInput.value || 'grid'} text-indigo-500`;
    });
</script>
{% endblock %}
