<!doctype html>
<html lang="de" class="h-full">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            boxShadow: {
              soft: '0 20px 60px -20px rgba(15, 23, 42, 0.35)'
            }
          }
        }
      }
    </script>
    <style>
      @keyframes drift {
        0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
        50% { transform: translate3d(18px, -12px, 0) scale(1.04); }
      }

      .bg-orb {
        animation: drift 16s ease-in-out infinite;
      }

      .bg-orb-slow {
        animation-duration: 22s;
        animation-direction: reverse;
      }
    </style>
  </head>
  <body class="min-h-full bg-slate-950 text-slate-100">
    <div class="absolute inset-0 -z-10 overflow-hidden pointer-events-none">
      <div class="bg-orb absolute -top-24 -right-16 h-72 w-72 rounded-full bg-cyan-500/20 blur-3xl"></div>
      <div class="bg-orb bg-orb-slow absolute top-40 -left-24 h-96 w-96 rounded-full bg-indigo-500/20 blur-3xl"></div>
      <div class="bg-orb absolute bottom-0 right-1/4 h-64 w-64 rounded-full bg-emerald-500/10 blur-3xl"></div>
    </div>

    <main class="mx-auto max-w-6xl px-4 py-10 sm:px-6 lg:px-8">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
