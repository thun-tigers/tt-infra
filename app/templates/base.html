<!doctype html>
<html lang="de" class="scroll-smooth">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            boxShadow: {
              soft: '0 20px 60px -20px rgba(15, 23, 42, 0.35)'
            }
          }
        }
      }
    </script>
    <script>
      (function() {
        function readCookie(name) {
          const match = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
          return match ? decodeURIComponent(match[1]) : null;
        }
        const stored = readCookie('tt_theme_global') || readCookie('tt_theme') || localStorage.getItem('theme') || 'system';
        const system = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        const effective = stored === 'system' ? system : stored;
        if (effective === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      })();
    </script>
    <style>
      @keyframes drift {
        0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
        50% { transform: translate3d(18px, -12px, 0) scale(1.04); }
      }

      .bg-orb {
        animation: drift 16s ease-in-out infinite;
      }

      .bg-orb-slow {
        animation-duration: 22s;
        animation-direction: reverse;
      }

      .glass {
        backdrop-filter: saturate(180%) blur(16px);
      }
    </style>
  </head>
  <body class="relative min-h-screen overflow-x-hidden bg-slate-100 dark:bg-slate-950 text-slate-900 dark:text-slate-50 antialiased">
    <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
      <div class="bg-orb absolute -top-24 -right-16 h-72 w-72 rounded-full bg-cyan-500/20 blur-3xl"></div>
      <div class="bg-orb bg-orb-slow absolute top-40 -left-24 h-96 w-96 rounded-full bg-indigo-500/20 blur-3xl"></div>
      <div class="bg-orb absolute bottom-0 right-1/4 h-64 w-64 rounded-full bg-emerald-500/10 blur-3xl"></div>
    </div>

    {% set ep = request.endpoint or '' %}
    <header class="sticky top-0 z-40 border-b border-slate-200/80 bg-white/85 glass dark:border-slate-800 dark:bg-slate-900/85">
      <div class="mx-auto flex h-14 max-w-6xl items-center gap-3 px-4 sm:px-6 lg:px-8">
        <a href="{{ auth_dashboard_url }}" class="h-10 w-10 shrink-0 rounded-lg overflow-hidden bg-white ring-1 ring-slate-200 dark:ring-slate-500 shadow-sm">
          <img src="{{ url_for('static', filename='tt-logo.png') }}" alt="TT" class="h-full w-full object-contain p-0.5">
        </a>

        <div class="min-w-0">
          <div class="text-[0.6rem] font-bold uppercase tracking-[0.22em] text-indigo-500 dark:text-indigo-300 leading-none">Thun Tigers</div>
          <div class="flex items-center gap-1.5">
            <i class="bi bi-hdd-network text-sm text-indigo-600 dark:text-indigo-400"></i>
            <span class="text-sm font-bold leading-tight truncate text-slate-900 dark:text-slate-100">Infra</span>
          </div>
        </div>

        <nav class="ml-auto hidden items-center gap-1 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50/80 dark:bg-slate-900/50 p-1 lg:flex">
          <a href="{{ url_for('admin.index') }}" class="inline-flex items-center gap-2 px-3 py-1.5 text-xs font-medium rounded-lg transition {{ 'bg-white dark:bg-slate-800 text-indigo-700 dark:text-indigo-300 shadow-sm ring-1 ring-indigo-100 dark:ring-indigo-900' if ep.startswith('admin.') else 'text-slate-500 dark:text-slate-400 hover:bg-white dark:hover:bg-slate-800 hover:text-slate-900' }}">
            <i class="bi bi-speedometer2"></i>
            Admin
          </a>
          <a href="{{ url_for('backup.backup_dashboard') }}" class="inline-flex items-center gap-2 px-3 py-1.5 text-xs font-medium rounded-lg transition {{ 'bg-white dark:bg-slate-800 text-indigo-700 dark:text-indigo-300 shadow-sm ring-1 ring-indigo-100 dark:ring-indigo-900' if ep.startswith('backup.') else 'text-slate-500 dark:text-slate-400 hover:bg-white dark:hover:bg-slate-800 hover:text-slate-900' }}">
            <i class="bi bi-archive"></i>
            Backup
          </a>
        </nav>

        <div class="ml-auto lg:ml-0 flex items-center gap-1.5">
          <a href="{{ auth_dashboard_url }}" class="relative hidden lg:inline-flex h-8 w-8 items-center justify-center rounded-lg text-slate-400 transition hover:text-indigo-500 hover:bg-slate-100 dark:hover:bg-slate-800" title="Apps">
            <i class="bi bi-grid-fill"></i>
          </a>

          <button id="themeToggle" class="h-8 w-8 grid place-items-center rounded-lg text-slate-400 hover:text-indigo-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition" title="Design">
            <i class="bi bi-moon-fill" id="themeIcon"></i>
          </button>

          <button id="mobileMenuToggle" class="inline-flex h-8 w-8 items-center justify-center rounded-lg text-slate-400 transition hover:bg-slate-100 dark:hover:bg-slate-800 lg:hidden" aria-expanded="false" aria-controls="mobileNav" aria-label="Menü öffnen">
          <i class="bi bi-list text-lg" id="mobileMenuIcon"></i>
          </button>

          <form method="post" action="{{ auth_logout_url|default(url_for('auth.logout')) }}" class="hidden lg:block">
            <button type="submit" class="h-8 w-8 grid place-items-center rounded-lg text-slate-400 transition hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30" title="Abmelden">
              <i class="bi bi-box-arrow-right"></i>
            </button>
          </form>
        </div>
      </div>

      <div id="mobileNav" class="hidden border-t border-slate-200 dark:border-slate-800 lg:hidden">
        <div class="px-4 py-3 space-y-1 sm:px-6">
          <a href="{{ url_for('admin.index') }}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition {{ 'bg-indigo-600 text-white' if ep.startswith('admin.') else 'bg-slate-50 dark:bg-slate-800 text-slate-700 dark:text-slate-200 hover:bg-indigo-50 dark:hover:bg-slate-700' }}">
            <i class="bi bi-speedometer2"></i>
            Admin
          </a>
          <a href="{{ url_for('backup.backup_dashboard') }}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition {{ 'bg-indigo-600 text-white' if ep.startswith('backup.') else 'bg-slate-50 dark:bg-slate-800 text-slate-700 dark:text-slate-200 hover:bg-indigo-50 dark:hover:bg-slate-700' }}">
            <i class="bi bi-archive"></i>
            Backup
          </a>
          <a href="{{ auth_dashboard_url }}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium bg-slate-50 dark:bg-slate-800 text-slate-700 dark:text-slate-200 hover:bg-indigo-50 dark:hover:bg-slate-700">
            <i class="bi bi-grid-fill"></i>
            Apps
          </a>
          <form method="post" action="{{ auth_logout_url|default(url_for('auth.logout')) }}">
            <button type="submit" class="flex w-full items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium bg-slate-50 dark:bg-slate-800 text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/30">
              <i class="bi bi-box-arrow-right"></i>
              Abmelden
            </button>
          </form>
        </div>
      </div>
    </header>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mx-auto mt-6 max-w-6xl space-y-3 px-4 sm:px-6 lg:px-8">
          {% for category, message in messages %}
            <div class="rounded-2xl border px-4 py-3 text-sm shadow-soft {% if category == 'success' %}border-emerald-300 bg-emerald-50 text-emerald-800 dark:border-emerald-400/30 dark:bg-emerald-500/10 dark:text-emerald-100{% elif category == 'warning' %}border-amber-300 bg-amber-50 text-amber-800 dark:border-amber-400/30 dark:bg-amber-500/10 dark:text-amber-100{% else %}border-rose-300 bg-rose-50 text-rose-800 dark:border-rose-400/30 dark:bg-rose-500/10 dark:text-rose-100{% endif %}">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <main class="mx-auto max-w-6xl px-4 py-10 sm:px-6 lg:px-8">
      {% block content %}{% endblock %}
    </main>

    <script>
      const themeToggle = document.getElementById('themeToggle');
      const themeIcon = document.getElementById('themeIcon');
      const mobileMenuToggle = document.getElementById('mobileMenuToggle');
      const mobileNav = document.getElementById('mobileNav');
      const mobileMenuIcon = document.getElementById('mobileMenuIcon');

      function readCookie(name) {
        const match = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
        return match ? decodeURIComponent(match[1]) : null;
      }

      function resolveTheme(preference) {
        if (preference === 'system') {
          return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        return preference;
      }

      function applyTheme(preference) {
        const effective = resolveTheme(preference);
        if (effective === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
        if (!themeIcon || !themeToggle) return;
        if (preference === 'system') {
          themeIcon.className = 'bi bi-circle-half';
          themeToggle.title = 'System';
        } else if (preference === 'dark') {
          themeIcon.className = 'bi bi-sun-fill';
          themeToggle.title = 'Hell';
        } else {
          themeIcon.className = 'bi bi-moon-fill';
          themeToggle.title = 'Dunkel';
        }
      }

      function saveTheme(preference) {
        localStorage.setItem('theme', preference);
        const host = window.location.hostname || '';
        let cookieDomain = '';
        if (host && host !== 'localhost' && !/^\d+\.\d+\.\d+\.\d+$/.test(host)) {
          const parts = host.split('.');
          if (parts.length >= 2) cookieDomain = '; domain=.' + parts.slice(-2).join('.');
        }
        const suffix = '; path=/; max-age=31536000; samesite=lax' + cookieDomain;
        document.cookie = 'tt_theme=' + encodeURIComponent(preference) + suffix;
        document.cookie = 'tt_theme_global=' + encodeURIComponent(preference) + suffix;
        applyTheme(preference);
      }

      let currentTheme = readCookie('tt_theme_global') || readCookie('tt_theme') || localStorage.getItem('theme') || 'system';
      if (!['light', 'dark', 'system'].includes(currentTheme)) currentTheme = 'system';
      applyTheme(currentTheme);

      if (themeToggle) {
        themeToggle.addEventListener('click', () => {
          const order = ['system', 'light', 'dark'];
          const idx = order.indexOf(currentTheme);
          currentTheme = order[(idx + 1) % order.length];
          saveTheme(currentTheme);
        });
      }

      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        if (currentTheme === 'system') applyTheme('system');
      });

      if (mobileMenuToggle && mobileNav) {
        mobileMenuToggle.addEventListener('click', () => {
          const hidden = mobileNav.classList.toggle('hidden');
          mobileMenuToggle.setAttribute('aria-expanded', String(!hidden));
          mobileMenuToggle.setAttribute('aria-label', hidden ? 'Menü öffnen' : 'Menü schließen');
          if (mobileMenuIcon) {
            mobileMenuIcon.classList.toggle('bi-list', hidden);
            mobileMenuIcon.classList.toggle('bi-x-lg', !hidden);
          }
        });

        mobileNav.querySelectorAll('a').forEach((link) => {
          link.addEventListener('click', () => {
            mobileNav.classList.add('hidden');
            mobileMenuToggle.setAttribute('aria-expanded', 'false');
            mobileMenuToggle.setAttribute('aria-label', 'Menü öffnen');
            if (mobileMenuIcon) {
              mobileMenuIcon.classList.add('bi-list');
              mobileMenuIcon.classList.remove('bi-x-lg');
            }
          });
        });
      }
    </script>
  </body>
</html>
